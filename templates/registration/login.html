<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ログイン</title>
    <style>
      body {
        margin: 0;
        font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
        background: #f4f6f8;
        color: #222;
      }
      .container {
        max-width: 420px;
        margin: 80px auto;
        background: #fff;
        border-radius: 12px;
        padding: 28px;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
      }
      h1 {
        margin-top: 0;
        font-size: 1.4rem;
      }
      .error {
        color: #b00020;
        margin-bottom: 12px;
      }
      label {
        display: block;
        margin-top: 14px;
        margin-bottom: 6px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 10px;
        border: 1px solid #c9d0d7;
        border-radius: 8px;
      }
      button {
        margin-top: 16px;
        width: 100%;
        border: 0;
        border-radius: 8px;
        padding: 10px 12px;
        background: #1c7ed6;
        color: #fff;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>ログイン</h1>
      {% if form.errors %}
      <p class="error">ユーザー名またはパスワードが違います。</p>
      {% endif %}
      <form method="post">
        {% csrf_token %} {{ form.username.label_tag }} {{ form.username }} {{ form.password.label_tag }} {{
        form.password }}
        <button type="submit">ログイン</button>
      </form>
    </main>
  </body>
</html>
