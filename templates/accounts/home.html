<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ホーム</title>
    <style>
      body {
        margin: 0;
        font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
        background: #f7fafc;
        color: #1a202c;
      }
      .container {
        max-width: 720px;
        margin: 48px auto;
        background: #fff;
        border-radius: 12px;
        padding: 28px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
      }
      h1 {
        margin-top: 0;
      }
      .meta {
        color: #4a5568;
      }
      .actions {
        margin-top: 20px;
      }
      button {
        border: 0;
        border-radius: 8px;
        padding: 10px 16px;
        background: #e53e3e;
        color: #fff;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>ログイン中です</h1>
      <p class="meta">username: {{ request.user.username }}</p>
      <p class="meta">display name: {{ request.user.display_name|default:"(未設定)" }}</p>
      <div class="actions">
        <form method="post" action="{% url 'logout' %}">
          {% csrf_token %}
          <button type="submit">ログアウト</button>
        </form>
      </div>
    </main>
  </body>
</html>
